<meta charset="UTF-8">

<title>Azeddine El Miri</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

html{scroll-behavior:smooth}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#f1f5f9;
color:#334155;
}

/* HEADER */

header{
background:#e2e8f0;
padding:18px 40px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
position:sticky;
top:0;
z-index:1000;
}

.logo{
font-size:22px;
font-weight:700;
color:#475569;
}

/* NAV */

nav{
display:flex;
}

nav a{
margin:0 12px;
text-decoration:none;
color:#475569;
font-weight:500;
}

.menu-toggle{
display:none;
font-size:28px;
cursor:pointer;
}

/* HERO PREMIUM */

.hero{
min-height:90vh;
display:flex;
align-items:center;
justify-content:center;
padding:60px 20px;
background:#0f172a;
position:relative;
overflow:hidden;
}

/* blur background */

.hero::before{
content:"";
position:absolute;
width:120%;
height:120%;
background:url("profile.jpeg") center/cover no-repeat;
filter:blur(40px) brightness(.4);
top:-10%;
left:-10%;
z-index:0;
}

/* content */

.hero-container{
max-width:1200px;
width:100%;
display:grid;
grid-template-columns:1fr 1fr;
gap:40px;
align-items:center;
position:relative;
z-index:1;
}

.hero-text{
color:white;
}

.hero-text h1{
font-size:48px;
font-weight:800;
margin-bottom:10px;
}

.hero-text h2{
color:#7dd3fc;
margin-bottom:20px;
}

.hero-buttons{
margin-top:20px;
}

.btn{
padding:14px 28px;
border-radius:10px;
margin:6px;
font-weight:600;
cursor:pointer;
border:none;
}

.primary{
background:#38bdf8;
color:white;
}

.outline{
border:2px solid white;
background:transparent;
color:white;
}

/* image */

.hero-image{
display:flex;
justify-content:center;
}

.hero-image img{
max-width:420px;
width:100%;
border-radius:18px;
box-shadow:0 20px 60px rgba(0,0,0,0.4);
}

/* SECTIONS */

.section{
max-width:1100px;
margin:auto;
padding:80px 20px;
}

.title{
text-align:center;
margin-bottom:30px;
}

.card,
.qual-card,
.strategy-card,
.audio-card{
background:linear-gradient(135deg,#ffffff,#f8fafc);
padding:30px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
margin-bottom:20px;
border-left:6px solid #38bdf8;
font-family:'Poppins',sans-serif;
line-height:1.7;
}

/* AUDIO */

.audio-card audio{
width:100%;
max-width:600px;
margin-bottom:20px;
}

/* DOCUMENTS */

.doc{
display:flex;
justify-content:space-between;
align-items:center;
margin:12px 0;
padding:18px;
background:#f8fafc;
border-radius:12px;
}

.download-btn{
background:#38bdf8;
color:white;
padding:10px 18px;
border-radius:8px;
text-decoration:none;
font-weight:600;
}

.download-btn:hover{
background:#0ea5e9;
}

/* CONTACT */

.contact{
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
}

.contact-box{
display:flex;
align-items:center;
margin-bottom:20px;
}

.icon{
width:50px;
height:50px;
background:#cbd5f5;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
margin-right:15px;
}

form input,
form textarea{
width:100%;
padding:14px;
border-radius:8px;
border:1px solid #cbd5e1;
margin-bottom:15px;
}

.send-btn{
background:#94a3b8;
color:white;
padding:14px;
border:none;
border-radius:10px;
cursor:pointer;
width:100%;
}

/* FOOTER */

footer{
background:#64748b;
color:white;
padding:60px 40px;
}

.footer-grid{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:30px;
}

.copy{
text-align:center;
margin-top:30px;
opacity:.8;
}

/* MOBILE */

@media(max-width:900px){

.hero-container{
grid-template-columns:1fr;
text-align:center;
}

.hero-text h1{
font-size:34px;
}

.hero-image img{
max-width:280px;
}

.contact{
grid-template-columns:1fr;
}

nav{
display:none;
width:100%;
flex-direction:column;
margin-top:15px;
}

nav.active{
display:flex;
}

nav a{
margin:10px 0;
}

.menu-toggle{
display:block;
}

}

</style>
</head>

<body>
